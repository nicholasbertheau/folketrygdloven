name: Oppdater folketrygdloven

on:
  schedule:
    - cron: '0 6 * * 1' # Hver mandag kl. 06:00 UTC
  workflow_dispatch: # Manuell kjøring

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install beautifulsoup4

      - name: Last ned og oppdater data
        run: python scripts/update_data.py

      - name: Sjekk for endringer
        id: check
        run: |
          if git diff --quiet folketrygdloven.json forskrifter.json changelog.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Ingen endringer i folketrygdloven."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Endringer funnet!"
          fi

      - name: Commit og push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add folketrygdloven.json forskrifter.json changelog.json
          git commit -m "Oppdater folketrygdloven data $(date +%Y-%m-%d)

          Automatisk oppdatering fra Lovdata API.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
